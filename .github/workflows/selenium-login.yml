name: Selenium Login E2E Tests

on:
  push:
    branches:
      - supabase-version
  pull_request:
    branches:
      - supabase-version

permissions:
  contents: write

jobs:
  selenium-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start Local HTTP Server
        run: |
          python3 -m http.server 8080 &
          echo "Local HTTP Server started on port 8080"
          sleep 3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: selenium-tests/package-lock.json

      - name: Install Test Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Run E2E Selenium Tests
        run: |
          cd selenium-tests
          HEADLESS=true node run_tests.js
        env:
          CI: true
          HEADLESS: true

      - name: Upload Web Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E2E_Web_Test_Report
          path: selenium-tests/E2E_Web_Test_Report.xlsx

  appium-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: appium-tests/package-lock.json

      - name: Install Test Dependencies
        run: |
          cd appium-tests
          npm install

      - name: Run Appium Tests Dry-Run
        run: |
          cd appium-tests
          npm run run-all

      - name: Upload Mobile Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E2E_Mobile_Test_Report
          path: appium-tests/E2E_Mobile_Test_Report.xlsx

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: selenium-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

  generate-reports:
    name: Generate SkillSwap Test Report
    runs-on: ubuntu-latest
    needs: [selenium-tests, appium-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Web Test Report
        uses: actions/download-artifact@v4
        with:
          name: E2E_Web_Test_Report
          path: reports/

      - name: Download Mobile Test Report
        uses: actions/download-artifact@v4
        with:
          name: E2E_Mobile_Test_Report
          path: reports/

      - name: Upload Combined E2E Reports
        uses: actions/upload-artifact@v4
        with:
          name: E2E_All_Test_Reports
          path: reports/
