name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug & Signed Release APKs
      run: ./gradlew assembleDebug assembleRelease --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkillSwap-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Signed Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SkillSwap-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Add Build Summary
      run: |
        echo "### 📱 Native Android APK Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "The compiled **SkillSwap Debug & Signed Release APKs** are available under **Artifacts** on this workflow run." >> $GITHUB_STEP_SUMMARY
